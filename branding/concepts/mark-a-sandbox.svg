<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="vibevm sandbox terminal mark">
  <!-- VM / sandbox boundary -->
  <rect x="22" y="22" width="196" height="196" rx="46" fill="#0D1117" stroke="#2DD4BF" stroke-width="7"/>
  <!-- inner firewall / egress-allowlist boundary -->
  <rect x="42" y="42" width="156" height="156" rx="30" fill="none" stroke="#2DD4BF" stroke-width="2.5" stroke-opacity="0.45" stroke-dasharray="3 9" stroke-linecap="round"/>
  <!-- terminal window dots -->
  <circle cx="70" cy="74" r="6" fill="#FF7A5C"/>
  <circle cx="92" cy="74" r="6" fill="#F2C14E" fill-opacity="0.9"/>
  <circle cx="114" cy="74" r="6" fill="#2DD4BF"/>
  <!-- agent prompt chevron -->
  <path d="M82 116 L108 138 L82 160" fill="none" stroke="#FF7A5C" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- blinking cursor block -->
  <rect x="120" y="150" width="40" height="13" rx="2.5" fill="#2DD4BF"/>
</svg>
